name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Verify backend
        shell: bash
        run: |
          set +e
          mvn -B -f backend/pom.xml verify > backend-verify.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 200 backend-verify.log
          fi
          exit "$status"
      - name: Upload backend failure log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-verify-log
          path: backend-verify.log
          retention-days: 1
          if-no-files-found: error

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked dependencies
        run: npm --prefix frontend ci --silent
      - name: Lint frontend
        run: npm --prefix frontend run lint
      - name: Typecheck shared UI
        run: npm --prefix frontend run typecheck --workspace @jere-platform/ui
      - name: Typecheck shell application
        run: npm --prefix frontend run typecheck:app --workspace @jere-platform/platform-shell
      - name: Test frontend
        run: npm --prefix frontend run test
      - name: Build frontend
        run: npm --prefix frontend run build

  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
