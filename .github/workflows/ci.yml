name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Verify backend
        run: mvn -B -f backend/pom.xml verify

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm --prefix frontend install --silent
      - name: Lint frontend
        run: npm --prefix frontend run lint
      - name: Typecheck shared UI
        run: npm --prefix frontend run typecheck --workspace @jere-platform/ui
      - name: Typecheck shell application
        run: npm --prefix frontend run typecheck:app --workspace @jere-platform/platform-shell
      - name: Typecheck Vite configuration
        run: npm --prefix frontend run typecheck:config --workspace @jere-platform/platform-shell
      - name: Test frontend
        run: npm --prefix frontend run test
      - name: Build frontend
        run: npm --prefix frontend run build

  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
