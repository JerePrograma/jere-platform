name: Apply verified frontend lockfile

on:
  workflow_run:
    workflows:
      - Generate frontend lockfile
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  apply:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'agent/generate-frontend-lockfile' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/generate-frontend-lockfile
          fetch-depth: 0
      - name: Download verified lockfile
        uses: actions/download-artifact@v8
        with:
          name: frontend-package-lock
          path: frontend
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Switch validation to npm ci
        shell: python
        run: |
          from pathlib import Path

          replacements = {
              Path('.github/workflows/ci.yml'): (
                  'npm --prefix frontend install --silent',
                  'npm --prefix frontend ci --silent',
              ),
              Path('scripts/validate.sh'): (
                  'npm --prefix frontend install',
                  'npm --prefix frontend ci',
              ),
              Path('scripts/validate.ps1'): (
                  'npm --prefix frontend install',
                  'npm --prefix frontend ci',
              ),
              Path('README.md'): (
                  'npm --prefix frontend install',
                  'npm --prefix frontend ci',
              ),
          }

          for path, (old, new) in replacements.items():
              text = path.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Expected command not found in {path}: {old}')
              path.write_text(text.replace(old, new), encoding='utf-8')
      - name: Remove generation trigger
        run: rm -f .lockfile-generation-trigger
      - name: Commit verified result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Commit verified frontend lockfile [lockfile-generated]"
          git push origin HEAD:agent/generate-frontend-lockfile
