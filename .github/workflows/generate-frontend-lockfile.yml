name: Generate frontend lockfile

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  generate:
    if: ${{ github.head_ref == 'agent/generate-frontend-lockfile' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/generate-frontend-lockfile
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Generate package lock
        run: npm --prefix frontend install --package-lock-only --ignore-scripts --no-audit --no-fund
      - name: Verify clean install and frontend
        run: |
          rm -rf frontend/node_modules
          npm --prefix frontend ci --silent
          npm --prefix frontend run check
          npm --prefix frontend run build
      - name: Upload verified lockfile
        uses: actions/upload-artifact@v7
        with:
          name: frontend-package-lock
          path: frontend/package-lock.json
          if-no-files-found: error
          retention-days: 1
