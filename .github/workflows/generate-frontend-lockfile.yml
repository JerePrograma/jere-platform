name: Generate frontend lockfile

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  generate:
    if: ${{ github.head_ref == 'agent/generate-frontend-lockfile' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/generate-frontend-lockfile
          fetch-depth: 0
      - name: Determine whether generation is required
        id: guard
        shell: bash
        run: |
          if [[ -f frontend/package-lock.json && ! -f .lockfile-generation-trigger ]]; then
            echo "required=false" >> "$GITHUB_OUTPUT"
          else
            echo "required=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v7
        if: steps.guard.outputs.required == 'true'
        with:
          node-version: "22"
      - name: Generate package lock
        if: steps.guard.outputs.required == 'true'
        run: npm --prefix frontend install --package-lock-only --ignore-scripts --no-audit --no-fund
      - name: Verify clean install and frontend
        if: steps.guard.outputs.required == 'true'
        run: |
          rm -rf frontend/node_modules
          npm --prefix frontend ci --silent
          npm --prefix frontend run check
          npm --prefix frontend run build
      - name: Remove temporary trigger
        if: steps.guard.outputs.required == 'true'
        run: rm -f .lockfile-generation-trigger
      - name: Publish verified lockfile
        if: steps.guard.outputs.required == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/package-lock.json
          git add -A .lockfile-generation-trigger
          git commit -m "Commit frontend lockfile [lockfile-generated]"
          git push origin HEAD:agent/generate-frontend-lockfile
