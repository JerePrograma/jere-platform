spring:
  application:
    name: jere-platform
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/jere_platform}
    username: ${DATABASE_USERNAME:jere_platform}
    password: ${DATABASE_PASSWORD:local_only_change_me}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    create-schemas: true
    schemas: platform
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  shutdown: graceful
