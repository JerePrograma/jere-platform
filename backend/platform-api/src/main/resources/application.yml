spring:
  application:
    name: jere-platform
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/jere_platform}
    username: ${DATABASE_USERNAME:jere_platform}
    password: ${DATABASE_PASSWORD:local_only_change_me}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    create-schemas: true
    schemas: platform
    locations: classpath:db/migration

platform:
  security:
    jwt-secret: ${AUTH_JWT_SECRET:}
    access-token-lifetime: ${AUTH_ACCESS_TOKEN_LIFETIME:PT15M}
    refresh-token-lifetime: ${AUTH_REFRESH_TOKEN_LIFETIME:P30D}
    refresh-cookie-secure: ${AUTH_REFRESH_COOKIE_SECURE:false}
    bootstrap-token: ${PLATFORM_BOOTSTRAP_TOKEN:}
  party-sources:
    gestudio-current-secret: ${PARTY_SOURCE_GESTUDIO_CURRENT_SECRET:}
    gestudio-previous-secret: ${PARTY_SOURCE_GESTUDIO_PREVIOUS_SECRET:}
    scalaris-current-secret: ${PARTY_SOURCE_SCALARIS_CURRENT_SECRET:}
    scalaris-previous-secret: ${PARTY_SOURCE_SCALARIS_PREVIOUS_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  shutdown: graceful
