services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jere_platform}
      POSTGRES_USER: ${POSTGRES_USER:-jere_platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_only_change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jere_platform} -d ${POSTGRES_DB:-jere_platform}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - jere-platform-postgres:/var/lib/postgresql/data

volumes:
  jere-platform-postgres:
